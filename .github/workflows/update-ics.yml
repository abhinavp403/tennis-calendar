name: Update Calendar (.ics)

on:
  push:
    branches: [main]
    paths:
      - data/tournaments.json
      - scripts/export_ics.py
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-ics
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate tennis_calendar.ics
        run: python3 scripts/export_ics.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- tennis_calendar.ics; then
            echo "No changes to tennis_calendar.ics"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tennis_calendar.ics
          git commit -m "Auto-regenerate tennis_calendar.ics"
          git push
